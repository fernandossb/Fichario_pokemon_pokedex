<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0b2d5c">
  <title>Fichário Pokémon BR</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="loading" class="loading-screen">
    <div class="pokeball-loader" aria-hidden="true"></div>
    <strong>Preparando o Fichário Pokémon...</strong>
    <span>Carregando catálogo, coleção e Pokédex.</span>
  </div>

  <div id="app" class="app hidden">
    <div class="sticky-shell">
      <header class="app-header">
        <div class="kicker">POKÉMON TCG BRASIL</div>
        <div class="header-row">
          <div>
            <h1>Fichário digital</h1>
            <p id="header-status">Coleção local protegida</p>
          </div>
          <button class="header-icon" onclick="openBackupPanel()" aria-label="Backup">⋮</button>
        </div>
      </header>
      <nav id="tabs" class="tabs" aria-label="Navegação principal"></nav>
    </div>
    <main id="content" class="content" aria-live="polite"></main>
  </div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" onclick="closeModal()"></div>
    <section id="modal-content" class="modal-sheet"></section>
  </div>

  <script src="data/catalog-data.js"></script>
  <script src="data/pokedex-data.js"></script>
  <script src="data/collection-seed-data.js"></script>
  <script src="app.js"></script>
  <script src="local-card-images.js"></script>
  <script src="image-fallback.js"></script>
</body>
</html>
