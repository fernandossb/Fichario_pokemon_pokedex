name: Gerar APK Android 16

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar SDK 35
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Configurar Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Validar Pokédex
        shell: bash
        run: |
          set -e
          test -f app/src/main/assets/www/index.html
          test -f app/src/main/assets/www/app.js
          test -f app/src/main/assets/www/data/pokedex.json
          grep -q "\['pokedex', 'Pokédex'\]" app/src/main/assets/www/app.js
          grep -q "renderPokedex" app/src/main/assets/www/app.js
          COUNT=$(find app/src/main/assets/www/sprites -maxdepth 1 -type f -name '*.png' | wc -l)
          echo "Sprites encontrados: $COUNT"
          test "$COUNT" -ge 1025

      - name: Compilar APK debug assinado
        run: gradle --no-daemon clean assembleDebug

      - name: Verificar APK
        shell: bash
        run: |
          set -e
          APK=app/build/outputs/apk/debug/app-debug.apk
          test -f "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | head -20

      - name: Preparar saída
        shell: bash
        run: |
          mkdir -p saida
          cp app/build/outputs/apk/debug/app-debug.apk saida/Fichario-Pokemon-v5-Pokedex-Precos-Fotos.apk

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: Fichario-Pokemon-v5-Pokedex-Precos-Fotos
          path: saida/Fichario-Pokemon-v5-Pokedex-Precos-Fotos.apk
          if-no-files-found: error
          retention-days: 30
